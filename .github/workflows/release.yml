name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            static_name: netscope-linux-x86_64
            cross: false
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            static_name: netscope-linux-aarch64
            cross: true
          - os: macos-12
            target: x86_64-apple-darwin
            static_name: netscope-macos-x86_64
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            static_name: netscope-macos-aarch64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            static_name: netscope-windows-x86_64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME}
          BIN=netscope
          TARGET=${{ matrix.target }}
          STATIC=${{ matrix.static_name }}
          mkdir -p dist

          if [[ "$TARGET" == *windows* ]]; then
            cp "target/${TARGET}/release/${BIN}.exe" dist/
            cd dist
            zip "${BIN}-${TAG}-${TARGET}.zip" "${BIN}.exe"
            cp "${BIN}-${TAG}-${TARGET}.zip" "${STATIC}.zip"
            cd ..
          else
            cp "target/${TARGET}/release/${BIN}" dist/
            tar -czf "dist/${BIN}-${TAG}-${TARGET}.tar.gz" -C dist "${BIN}"
            cp "dist/${BIN}-${TAG}-${TARGET}.tar.gz" "dist/${STATIC}.tar.gz"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/netscope-*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
